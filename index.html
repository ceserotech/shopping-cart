<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container-fluid py-4">
        <div class="row g-4">
            <!-- Products Section -->
            <div class="col-lg-8">
                <h1 class="mb-3">Desserts</h1>
                <div class="row" id="product-list">
                    <!-- JS will render products here -->
                </div>
            </div>

            <!-- Cart Section -->
            <div class="col-lg-4">
                <h3 class="cart-header">Your Cart</h3>
                <div class="bg-light p-3 rounded" id="cart-items">
                    <!-- JS will render cart items here -->
                </div>
                <div class="d-flex justify-content-between mt-3">
                    <h5 class="numofitem"></h5>
                    <h5 class="totalprice"></h5>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/script.js"></script>
</body>

</html>
